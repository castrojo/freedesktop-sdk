variables:
  (?):
  - target_arch == "aarch64":
      conf-arch: ""
  - target_arch == "i686":
      # pentium4 == sse2
      conf-arch: >-
        --with-cpu=pentium4
        --with-tune=generic
        --with-fpmath=sse
  - target_arch == "loongarch64":
      conf-arch: >-
        --with-arch=la64v1.0
        --with-tune=loongarch64
  - target_arch == "ppc64le":
      conf-arch: >-
        --with-cpu=power8
        --with-tune=power8
  - target_arch == "ppc64":
      conf-arch: >-
        --with-cpu=power8
        --with-tune=power8
  - target_arch == "riscv64":
      conf-arch: >-
        --with-arch=rv64gc
  - target_arch == "x86_64":
      (?):
        - x86_64_v3:
            arch-opt: x86-64-v3
            tune-opt: skylake
        - not x86_64_v3:
            arch-opt: x86-64
            tune-opt: generic
      conf-arch: >-
        --with-tune=%{tune-opt}
        --with-arch_64=%{arch-opt}
