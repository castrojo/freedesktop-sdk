variables:
  disable-source: >-
    --disable-gdb
    --disable-gdbserver
    --disable-libdecnumber
    --disable-readline
    --disable-sim

public:
  cpe:
    version-match: '([0-9]*)_([0-9]*)'
    patches:
    - CVE-2022-38533
    ignored:
    - CVE-2022-38126
    - CVE-2022-38127

sources:
- kind: git_tag
  url: sourceware:binutils-gdb.git
  track: master
  track-extra:
  - binutils-2_39-branch
  # Attempt to predict the next branchpoint.
  - binutils-2_40-branch
  ref: binutils-2_39-0-gb51c2fec1da205ea3e7354cbb3e253018d64873c
- kind: patch
  path: patches/binutils/PR29482-strip-heap-buffer-overflow.patch
