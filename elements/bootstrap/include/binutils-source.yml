variables:
  disable-source: >-
    --disable-gdb
    --disable-gdbserver
    --disable-libdecnumber
    --disable-readline
    --disable-sim

public:
  cpe:
    version-match: '([0-9]*)_([0-9]*)'
    patches:
    - CVE-2022-38533
    - CVE-2022-4285
    - CVE-2022-44840
    - CVE-2022-45703
    - CVE-2022-47007
    - CVE-2022-47008
    - CVE-2022-47010

sources:
- kind: git_tag
  url: sourceware:binutils-gdb.git
  track: master
  track-extra:
  - binutils-2_38-branch
  match:
  - 'binutils-*'
  ref: binutils-2_38-0-g20756b0fbe065a84710aa38f2457563b57546440
- kind: patch_queue
  path: patches/binutils
