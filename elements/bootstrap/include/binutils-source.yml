variables:
  disable-source: >-
    --disable-gdb
    --disable-gdbserver
    --disable-libdecnumber
    --disable-readline
    --disable-sim

config:
  configure-commands:
    (<):
    - |
      # https://sourceware.org/bugzilla/show_bug.cgi?id=29933
      rm -rf gdb

public:
  cpe:
    version-match: '([0-9]*)_([0-9]*)'
    patches:
    - CVE-2025-1153

sources:
- kind: git_repo
  url: sourceware:binutils-gdb.git
  track: binutils-*
  exclude:
  - binutils-2_41
  ref: binutils-2_45_1-0-g48324fde1e284293dd3d570dba597cb644921c92
