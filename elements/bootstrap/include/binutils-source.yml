variables:
  disable-source: >-
    --disable-gdb
    --disable-gdbserver
    --disable-libdecnumber
    --disable-readline
    --disable-sim

config:
  configure-commands:
    (<):
    - |
      # https://sourceware.org/bugzilla/show_bug.cgi?id=29933
      rm -rf gdb

public:
  cpe:
    version-match: '([0-9]*)_([0-9]*)'

sources:
- kind: git_repo
  url: sourceware:binutils-gdb.git
  track: binutils-*
  ref: binutils-2_41-0-g2c73aeb8d2e02de7b69cbcb13361cfbca9d76a4e
