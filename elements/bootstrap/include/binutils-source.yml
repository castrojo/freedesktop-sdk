variables:
  disable-source: >-
    --disable-gdb
    --disable-gdbserver
    --disable-libdecnumber
    --disable-readline
    --disable-sim

config:
  configure-commands:
    (<):
    - |
      # https://sourceware.org/bugzilla/show_bug.cgi?id=29933
      rm -rf gdb

public:
  cpe:
    version-match: '([0-9]*)_([0-9]*)'

sources:
- kind: git_repo
  url: sourceware:binutils-gdb.git
  track: binutils-*
  exclude:
  - binutils-2_41
  ref: binutils-2_44-0-g815d9a14cbbb3b81843f7566222c87fb22e7255d
- kind: patch
  path: patches/binutils/gprofng-examples-tgz-deterministic.patch
