(@):
- elements/bootstrap/include/gcc-source.yml

environment:
  CFLAGS_FOR_TARGET:  "%{cross_flags}"
  CXXFLAGS_FOR_TARGET: "%{cross_flags}"
  LDFLAGS_FOR_TARGET:  "%{ldflags_defaults}"
  PYTHON: python3

variables:
  conf-link-args: |
    --enable-shared \
    --enable-static
  autogen: |
    autoreconf2.69 -fvi
    for conf in */configure.ac; do
      dir="$(dirname "${conf}")"
      case "$(dirname "${conf}")" in
        isl)
          args=()
          ;;
        *)
          args=("-I" "../config")
          ;;
      esac
      echo "autoreconf: ${dir}"
      (cd "${dir}" && autoreconf2.69 "${args[@]}" -fvi)
    done
  make-args: >-
    MAKEINFO=true

  conf-local: >-
    --target=%{cross_triplet}
    --enable-multiarch
    --disable-multilib
    --disable-bootstrap
    --disable-nls
    --with-sysroot=%{sysroot}
    --enable-languages=c,c++,fortran,objc,obj-c++
    --enable-default-pie
    --enable-default-ssp
    --with-isl
    --disable-libssp
    --enable-deterministic-archives
    --enable-linker-build-id
    --disable-libstdcxx-filesystem-ts
    %{conf-arch}

config:
  install-commands:
    (>):
    - |
      rm "%{install-root}%{bindir}/%{cross_triplet}-c++"
      ln -s "%{cross_triplet}-g++" "%{install-root}%{bindir}/%{cross_triplet}-c++"

    - |
      rm "%{install-root}%{bindir}/%{cross_triplet}-gcc"
      ln -s "%{cross_triplet}-gcc-$(cat gcc/BASE-VER)" "%{install-root}%{bindir}/%{cross_triplet}-gcc"

    - |
      for f in "%{install-root}%{bindir}/"*; do
        base="$(basename "${f}")"
        case "${base}" in
          %{cross_triplet}-*)
            continue
          ;;
          *)
            if [ -f "%{install-root}%{bindir}/%{cross_triplet}-${base}" ]; then
              rm "${f}"
              ln -s "%{cross_triplet}-${base}" "${f}"
            fi
          ;;
        esac
      done

  # strip-binaries fails when cross compiling because artifact
  # contains 2 architectures.
  strip-commands: []
