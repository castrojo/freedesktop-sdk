(@):
- elements/cross-compilers/cross-host-arch.yml
- elements/cross-compilers/cross-host-flags.yml

variables:
  sysroot: /cross-installation
  cross-host-tools: "/cross-%{cross_host_arch}"

  toolchain-prefixes: >-
    %{cross-host-tools}
    /usr
    %{prefix}

  bootstrapper-gcc-triplet: "%{gcc_arch}-linux-gnu"
  bootstrapper-triplet: "%{arch}-bootstrapper-linux-gnu"

environment:
  PATH: "%{cross-host-tools}/bin:/bin"
