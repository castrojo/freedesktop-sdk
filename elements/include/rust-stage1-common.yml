build-depends:
- public-stacks/runtime-minimal.bst
- bootstrap/grep.bst
- bootstrap/sed.bst

config:
  install-commands:
  - |
    bash install.sh \
      --prefix="%{prefix}" \
      --destdir="%{install-root}" \
      --disable-ldconfig

  - |
    %{install-extra}

  # Disable debug handling in stage1 which is unnecessary and can cause
  # failures during dwz optimizations.
  strip-commands: []
