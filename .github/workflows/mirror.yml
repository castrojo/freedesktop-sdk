name: Mirror freedesktop-sdk from GitLab

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:         # manual trigger

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Clone from GitLab (bare)
        run: |
          echo "==> Cloning https://gitlab.com/freedesktop-sdk/freedesktop-sdk.git"
          git clone --bare https://gitlab.com/freedesktop-sdk/freedesktop-sdk.git repo.git
          cd repo.git
          echo "==> Branches in upstream:"
          git branch -a
          echo "==> Tags (count):"
          git tag | wc -l

      - name: Push branches and tags to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd repo.git
          echo "==> Pushing branches..."
          git push \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/castrojo/freedesktop-sdk.git" \
            '+refs/heads/*:refs/heads/*'
          echo "==> Pushing tags..."
          git push \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/castrojo/freedesktop-sdk.git" \
            '+refs/tags/*:refs/tags/*'
          echo "==> Mirror sync complete."
