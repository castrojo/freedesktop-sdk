name: freedesktop-sdk

min-version: 2.0

aliases:
  (@): include/_private/aliases.yml

(@): include/_private/mirrors.yml

element-path: elements

fatal-warnings:
- overlaps

variables:
  (@):
  - include/_private/arch.yml
  - include/_private/build-dirs.yml
  - include/_private/build-flags.yml
  - include/strip.yml
  - include/_private/versions.yml

  branch: '%{freedesktop-sdk-flatpak-branch}'
  snap-branch: '%{freedesktop-sdk-snap-branch}'

  sysroot: /cross-installation
  tools: /cross

environment:
  (@): include/_private/environment.yml

split-rules:
  (@): include/_private/split-rules.yml

plugins:
  - origin: local
    path: plugins/sources
    sources:
    - crate

  - origin: local
    path: plugins/elements
    elements:
    - check_forbidden
    - snap_image
    - export
    - re_import
    - collect_initial_scripts
    - url_manifest
  - origin: local
    path: plugins/sources
    sources:
    - ostree_mirror

  - origin: pip
    package-name: bst-plugins-experimental
    elements:
    - cmake
    - collect_integration
    - collect_manifest
    - distutils
    - flatpak_image
    - flatpak_repo
    - make
    - meson
    - tar_element
    - x86image
    - oci
    - pip
    sources:
    - cargo
    - git_tag
    - ostree
    - pip

options:
  (@): include/_private/options.yml

artifacts:
  url: https://freedesktop-sdk-cache.codethink.co.uk:11001

sandbox:
  build-arch: '%{bootstrap_build_arch}'

elements:
  cmake:
    (@): include/_private/cmake-conf.yml
  autotools:
    (@): include/_private/autotools-conf.yml
  meson:
    (@): include/_private/meson-conf.yml
  pip:
    (@): include/_private/pip.yml
  distutils:
    (@): include/_private/distutils.yml
  makemaker:
    (@): include/_private/makemaker.yml

sources:
  git_tag:
    (@): include/_private/git_tag-conf.yml

junctions:
  # We can declare these junctions as "internal" because we only use them for build dependencies
  # Therefore we know they can't collide with elements in dependant projects.
  internal:
  - cross-compilers/freedesktop-sdk-aarch64.bst
  - cross-compilers/freedesktop-sdk-arm.bst
  - cross-compilers/freedesktop-sdk-i686.bst
