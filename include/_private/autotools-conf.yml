# Project-wide configuration of autotools elements

variables:
  conf-deterministic: |
    --enable-deterministic-archives
  conf-link-args: |
    --enable-shared \
    --disable-static
  conf-host: |
    --host=%{host-triplet}
  conf-build: |
    --build=%{build-triplet}
  conf-libtool-force-dlsearch: |
    lt_cv_sys_lib_dlsearch_path_spec="/usr/lib/%{gcc_triplet}"

  conf-global: >-
      %{conf-deterministic}
      %{conf-link-args}
      %{conf-build}
      %{conf-host}
      %{conf-libtool-force-dlsearch}

  conf-root: "%{build-root}"
  command-subdir: _build

  remove-libtool-modules: "true"
  remove-libtool-libraries: "true"
