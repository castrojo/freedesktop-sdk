# Definition of source mirrors

# Need to include the key as otherwise we have a YAML list, not a dict
mirrors:
- name: freedesktop-sdk-git-mirrors
  kind: simple_mirror
  config:
    url: https://gitlab.com/freedesktop-sdk/mirrors/{alias}/
    aliases:
    - chromium
    - debian_salsa
    - denx
    - fedora_rpms
    - ffmpeg
    - freedesktop
    - freedesktop_people
    - gcc_gnu_org
    - ghostscript
    - git_https
    - github
    - gitlab
    - gnome
    - gnu-efi
    - gnupg
    - kennylevinsen
    - kernel
    - kitware
    - libdaemon
    - liburcu
    - netfilter
    - nettle
    - pagure
    - passt
    - samba
    - savannah
    - sourceforge_git
    - sourceware
    - tukaani
    - xiph

# for sources that consist of a single, downloadable file, eg tarballs, zipfiles, and rust crates
- name: freedesktop-sdk-raw-file-mirrors
  kind: gitlab_lfs_mirror
  config:
    url: https://gitlab.com/
    project: freedesktop-sdk/mirrors/{alias}/raw-files
    aliases:
    - cpan
    - crates
    - ftp_gnu_org
    - github_files
    - oasis_open_xml
    - pagure_releases
    - pypi
    - sourceforge
    - sourceforge_download
    - sourceware_pub
    - tar_https

# "Not real mirrors" for things under our control
- name: freedestkop-sdk
  kind: fake_mirror
  config:
    aliases:
    - fdsdk_git
    - fdsdk_registry
