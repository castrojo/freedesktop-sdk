variables:
  license-files: |
    COPYING \
    COPYING* \
    COPYRIGHT \
    Copyright \
    copyright \
    COPYRIGHT* \
    Copyright* \
    copyright* \
    LICEN* \
    Licen* \
    licen*
  license-files-extra: ""
  license-files-final: >-
    %{license-files}
    %{license-files-extra}
  license-root: "%{build-root}"
  license-element-name: ""

  install-extra: |
    %{install-licenses}

elements:
  autotools:
    config:
      install-commands:
        (>):
        - "%{install-extra}"
  cmake:
    config:
      install-commands:
        (>):
        - "%{install-extra}"
  make:
    config:
      install-commands:
        (>):
        - "%{install-extra}"
  makemaker:
    config:
      install-commands:
        (>):
        - "%{install-extra}"
  meson:
    config:
      install-commands:
        (>):
        - "%{install-extra}"
  pyproject:
    config:
      install-commands:
        (>):
        - "%{install-extra}"
