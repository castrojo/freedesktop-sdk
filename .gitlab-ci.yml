.app_ppc64:
  extends:
    - .flatpak_template
    - .builder-ppc64
  allow_failure: true
  when: manual
  needs:
  - bootstrap_ppc64

.check-snap:
  stage: snap
  script:
    - make export-snap
    - python3 utils/parse_review.py snap/sdk.snap
    - python3 utils/parse_review.py snap/platform.snap
    - python3 utils/parse_review.py snap/glxinfo.snap
    - python3 utils/parse_review.py snap/vulkaninfo.snap
    - python3 utils/parse_review.py snap/clinfo.snap
    - python3 utils/parse_review.py snap/vainfo.snap
  artifacts:
    when: always
    paths:
      - ${CI_PROJECT_DIR}/cache/buildstream/logs
  allow_failure: true
  rules:
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    when: manual

.check_snap_x86_64:
  extends:
    - .check-snap
    - .builder-x86_64

.check_snap_i686:
  extends:
    - .check-snap
    - .builder-i686

.bootstrap_template:
  stage: bootstrap
  script:
    - make bootstrap
  artifacts:
    when: always
    paths:
      - ${CI_PROJECT_DIR}/cache/buildstream/logs
  rules:
  - if: '$CI_PIPELINE_SOURCE == "schedule"'
    when: never
  - if: '$CI_COMMIT_TAG || $CI_COMMIT_BRANCH =~ /^release\/.*/'
    when: never
  - when: manual

bootstrap_ppc64:
  extends:
    - .bootstrap_template
    - .builder-x86_64
  allow_failure: true
  variables:
    ARCH: ppc64

.vm_imageless_template:
  stage: vm
  script:
    - make build-vm
    - |
      if [ "${DIALOG+set}" = set ]; then
        utils/test_minimal_system.py --dialog "${DIALOG}" command 'make run-vm'
      fi
  artifacts:
    when: always
    paths:
      - ${CI_PROJECT_DIR}/cache/buildstream/logs
  rules:
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

minimal_systemd_vm_x86_64:
