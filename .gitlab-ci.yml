        utils/test_minimal_system.py --dialog "${DIALOG}" command 'make run-efi-vm'
      fi
  artifacts:
    when: always
    paths:
      - ${CI_PROJECT_DIR}/cache/buildstream/logs
  rules:
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

minimal_efi_vm_image_x86_64:
  extends:
    - .vm_efi_image_template
